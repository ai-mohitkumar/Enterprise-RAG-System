services:
  - type: web
    name: rag-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements_prod.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PUBLIC_API_URL
        sync: false
